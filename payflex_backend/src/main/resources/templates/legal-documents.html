<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Documents juridiques</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="/css/admin-wow.css">
</head>
<body class="pf-admin bg-slate-100 min-h-screen">
<th:block th:replace="~{fragments/admin-chrome :: startMain('space-y-6')}"/>
<th:block th:replace="~{fragments/admin-chrome :: pageHeader('Documents juridiques','CGU, confidentialité — affichés dans l’app mobile')}"/>

<p class="text-sm text-slate-600 -mt-2">
  Les textes sont récupérés par l’application mobile à l’inscription. Utilisez des paragraphes simples (retours à la ligne).
</p>

<section th:each="doc : ${documents}" class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 space-y-3">
  <div class="flex flex-wrap items-center justify-between gap-2">
    <h3 class="font-semibold text-slate-800" th:text="${doc.title()}"></h3>
    <span class="text-xs text-slate-500 font-mono" th:text="'code: ' + ${doc.code()}"></span>
  </div>
  <p class="text-xs text-slate-500" th:if="${doc.updatedAt() != null}">
    Dernière mise à jour : <span th:text="${doc.updatedAt()}"></span>
    <span th:if="${doc.updatedBy() != null && !doc.updatedBy().isBlank()}" th:text="' — ' + ${doc.updatedBy()}"></span>
  </p>
  <form method="post" action="/admin/legal-documents/save" class="space-y-3">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <input type="hidden" name="code" th:value="${doc.code()}">
    <div>
      <label class="block text-xs font-medium text-slate-600 mb-1">Titre affiché dans l’app</label>
      <input name="title" required class="border rounded-lg px-3 py-2 w-full text-sm" th:value="${doc.title()}">
    </div>
    <div>
      <label class="block text-xs font-medium text-slate-600 mb-1">Contenu</label>
      <textarea name="content" required rows="14"
                class="border rounded-lg px-3 py-2 w-full text-sm font-sans leading-relaxed"
                th:text="${doc.content()}"></textarea>
    </div>
    <div class="flex justify-end">
      <button type="submit" class="pf-btn pf-btn-primary text-sm py-2 px-4">
        <i class="fa-solid fa-floppy-disk mr-1"></i>Enregistrer
      </button>
    </div>
  </form>
</section>

<th:block th:replace="~{fragments/admin-chrome :: endMain}"/>
<script src="/js/admin-wow.js"></script>
<script th:inline="javascript">
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof pfFlashFromParams === 'function') {
      pfFlashFromParams({
        success: /*[[${success}]]*/ false,
        successText: /*[[${successText}]]*/ '',
        error: /*[[${error}]]*/ false,
        errorText: /*[[${errorText}]]*/ '',
      });
    }
  });
</script>
</body>
</html>
