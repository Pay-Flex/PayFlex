<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${ownProfile ? 'Mon profil gestionnaire' : 'Dossier gestionnaire'}">Profil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="/css/admin-wow.css">
</head>
<body class="pf-admin bg-slate-100 min-h-screen">
<th:block th:replace="~{fragments/admin-chrome :: startMain('space-y-6 max-w-5xl')}"/>

<header class="pf-admin-page-header items-start mb-2">
  <div>
    <a th:if="${adminFullAccess}" href="/admin/gestionnaires" class="pf-admin-page-back"><i class="fa-solid fa-arrow-left mr-1"></i>Gestionnaires</a>
    <h2 class="pf-admin-page-title text-2xl font-bold mt-1" th:text="${ownProfile ? 'Mon profil' : profile.fullName}"></h2>
    <p class="pf-admin-page-sub text-sm mt-1">
      <span class="font-mono text-slate-500" th:text="${profile.username}"></span>
      <span class="mx-2">·</span>
      Complétude dossier : <strong th:text="${profile.completenessPercent} + '%'"></strong>
    </p>
  </div>
  <div class="flex items-center gap-3" th:if="${profile.photoPath != null && !#strings.isEmpty(profile.photoPath)}">
    <img th:src="@{/admin/gestionnaires/{u}/photo(u=${profile.username})}" alt="Photo"
         class="w-16 h-16 rounded-full object-cover border-2 border-white shadow">
  </div>
</header>

<div th:if="${errorMessage}" class="rounded-xl border border-red-200 bg-red-50 text-red-800 px-4 py-3 text-sm" th:text="${errorMessage}"></div>

<div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
  <div class="h-2 rounded-full transition-all" th:style="'width:' + ${profile.completenessPercent} + '%;background:var(--pf-admin-gold)'"></div>
</div>

<div class="flex flex-wrap gap-2 text-sm"
     th:if="${(profile.photoPath != null && !#strings.isEmpty(profile.photoPath)) or (profile.idDocumentPath != null && !#strings.isEmpty(profile.idDocumentPath)) or (profile.contractDocumentPath != null && !#strings.isEmpty(profile.contractDocumentPath))}">
  <a th:if="${profile.photoPath != null && !#strings.isEmpty(profile.photoPath)}"
     th:href="@{/admin/gestionnaires/{u}/photo(u=${profile.username})}" target="_blank" class="pf-btn pf-btn-secondary text-xs"><i class="fa-solid fa-image mr-1"></i>Photo</a>
  <a th:if="${profile.idDocumentPath != null && !#strings.isEmpty(profile.idDocumentPath)}"
     th:href="@{/admin/gestionnaires/{u}/identity(u=${profile.username})}" target="_blank" class="pf-btn pf-btn-secondary text-xs"><i class="fa-solid fa-id-card mr-1"></i>Pièce d'identité</a>
  <a th:if="${profile.contractDocumentPath != null && !#strings.isEmpty(profile.contractDocumentPath)}"
     th:href="@{/admin/gestionnaires/{u}/contract(u=${profile.username})}" target="_blank" class="pf-btn pf-btn-secondary text-xs"><i class="fa-solid fa-file-contract mr-1"></i>Contrat signé</a>
</div>

<form method="post" th:action="@{/admin/gestionnaires/{u}/update(u=${profile.username})}" enctype="multipart/form-data" class="space-y-6">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
  <th:block th:replace="~{fragments/admin-moderation-fields :: changeReason}"/>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-id-card mr-2 text-blue-700"></i>Identité</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="md:col-span-2"><label class="text-xs font-semibold text-slate-600">Nom complet <span class="text-red-500">*</span></label>
        <input name="fullName" required th:value="${profile.fullName}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Sexe</label>
        <select name="gender" class="border rounded-lg px-3 py-2 w-full text-sm mt-1">
          <option value="">—</option>
          <option value="Homme" th:selected="${profile.gender == 'Homme'}">Homme</option>
          <option value="Femme" th:selected="${profile.gender == 'Femme'}">Femme</option>
        </select></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone</label>
        <input name="phone" th:value="${profile.phone}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">E-mail</label>
        <input name="email" type="email" th:value="${profile.email}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Ville</label>
        <input name="city" th:value="${profile.city}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div class="md:col-span-2"><label class="text-xs font-semibold text-slate-600">Adresse</label>
        <textarea name="personalAddress" rows="2" class="border rounded-lg px-3 py-2 w-full text-sm mt-1" th:text="${profile.personalAddress}"></textarea></div>
    </div>
  </section>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-briefcase mr-2 text-blue-700"></i>Poste & contrat</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div><label class="text-xs font-semibold text-slate-600">Fonction</label>
        <input name="jobTitle" th:value="${profile.jobTitle}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Matricule</label>
        <input name="matricule" th:value="${profile.matricule}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Type de contrat</label>
        <input name="contractType" th:value="${profile.contractType}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Date d'embauche</label>
        <input name="hireDate" type="date" th:value="${profile.hireDate}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Contrat signé le</label>
        <input name="contractSignedDate" type="date" th:value="${profile.contractSignedDate}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
    </div>
  </section>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-phone-volume mr-2 text-amber-600"></i>Urgence & à prévenir</h2>
    <div class="grid md:grid-cols-3 gap-4 mb-4">
      <div><label class="text-xs font-semibold text-slate-600">Urgence — nom</label><input name="emergencyContactName" th:value="${profile.emergencyContactName}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone</label><input name="emergencyContactPhone" th:value="${profile.emergencyContactPhone}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Lien</label><input name="emergencyContactRelation" th:value="${profile.emergencyContactRelation}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
    </div>
    <div class="grid md:grid-cols-3 gap-4">
      <div><label class="text-xs font-semibold text-slate-600">À prévenir — nom</label><input name="notifyContactName" th:value="${profile.notifyContactName}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone</label><input name="notifyContactPhone" th:value="${profile.notifyContactPhone}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Lien</label><input name="notifyContactRelation" th:value="${profile.notifyContactRelation}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
    </div>
  </section>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-handshake mr-2 text-violet-700"></i>Caution & contacts</h2>
    <div class="grid md:grid-cols-3 gap-4 mb-4">
      <div><label class="text-xs font-semibold text-slate-600">Cautionnaire</label><input name="guarantorName" th:value="${profile.guarantorName}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone</label><input name="guarantorPhone" th:value="${profile.guarantorPhone}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Lien</label><input name="guarantorRelation" th:value="${profile.guarantorRelation}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
    </div>
    <div class="grid md:grid-cols-2 gap-4">
      <div><label class="text-xs font-semibold text-slate-600">Autre contact</label><input name="secondaryContactName" th:value="${profile.secondaryContactName}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone</label><input name="secondaryContactPhone" th:value="${profile.secondaryContactPhone}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div class="md:col-span-2"><th:block th:replace="~{fragments/admin-chrome :: hrReferentHelp}"/></div>
      <div><label class="text-xs font-semibold text-slate-600">Nom du référent interne (contact RH)</label><input name="supervisorName" th:value="${profile.supervisorName}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1" placeholder="Optionnel"></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone du référent</label><input name="supervisorPhone" type="tel" th:value="${profile.supervisorPhone}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1" placeholder="Optionnel"></div>
    </div>
  </section>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-clipboard-check mr-2"></i>Références</h2>
    <textarea name="referencesNotes" rows="3" class="border rounded-lg px-3 py-2 w-full text-sm" th:text="${profile.referencesNotes}"></textarea>
    <div th:unless="${readOnlyInternalNotes}" class="mt-4">
      <label class="text-xs font-bold text-amber-800 uppercase">Notes RH internes (admin)</label>
      <textarea name="internalNotes" rows="3" class="border rounded-lg px-3 py-2 w-full text-sm mt-1 bg-amber-50" th:text="${profile.internalNotes}"></textarea>
    </div>
  </section>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-paperclip mr-2"></i>Mettre à jour les pièces</h2>
    <p class="text-xs text-slate-500 mb-3">Laissez vide pour conserver le fichier actuel.</p>
    <div class="grid md:grid-cols-3 gap-4">
      <div><label class="text-xs font-semibold text-slate-600">Photo profil</label><input name="photo" type="file" accept="image/*,.pdf" class="text-xs mt-1 w-full"></div>
      <div><label class="text-xs font-semibold text-slate-600">Pièce d'identité</label><input name="idDocument" type="file" accept="image/*,.pdf" class="text-xs mt-1 w-full"></div>
      <div><label class="text-xs font-semibold text-slate-600">Contrat signé</label><input name="contractDocument" type="file" accept=".pdf,image/*" class="text-xs mt-1 w-full"></div>
    </div>
  </section>

  <button type="submit" class="pf-btn pf-btn-primary"><i class="fa-solid fa-floppy-disk mr-2"></i>Enregistrer le dossier</button>
</form>

<th:block th:replace="~{fragments/admin-chrome :: endMain}"/>
<script>
  (function () {
    const p = new URLSearchParams(location.search);
    if (p.get('saved')) Swal.fire({ icon: 'success', title: 'Dossier enregistré', timer: 1600, showConfirmButton: false });
    if (p.get('created')) Swal.fire({ icon: 'success', title: 'Gestionnaire créé', timer: 1800, showConfirmButton: false });
    if (p.has('saved') || p.has('created')) history.replaceState({}, '', location.pathname);
  })();
</script>
<script src="/js/admin-wow.js"></script>
</body>
</html>
