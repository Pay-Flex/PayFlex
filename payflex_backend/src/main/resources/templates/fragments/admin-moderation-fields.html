<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="changeReason" th:if="${adminRequiresChangeReason}" class="md:col-span-full bg-amber-50 border border-amber-200 rounded-lg p-3 mb-2">
  <label class="block text-xs font-semibold text-amber-900 mb-1">Motif de la modification <span class="text-red-600">*</span></label>
  <textarea name="changeReason" required rows="2" minlength="5"
            class="border border-amber-200 rounded-lg px-3 py-2 w-full text-sm bg-white"
            placeholder="Expliquez pourquoi vous modifiez cette fiche (visible dans le journal admin)."></textarea>
</div>
</body>
</html>
