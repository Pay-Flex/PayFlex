<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Catégories produits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="/css/admin-wow.css">
</head>
<body class="pf-admin bg-slate-100 min-h-screen">
<th:block th:replace="~{fragments/admin-chrome :: startMain('space-y-6')}"/>
<th:block th:replace="~{fragments/admin-chrome :: pageHeader('Catégories catalogue','Référentiel pour classer les produits')}"/>

    <div class="flex flex-wrap justify-end gap-2 -mt-2">
      <a href="/admin/products" class="pf-btn pf-btn-secondary text-sm shrink-0"><i class="fa-solid fa-toolbox mr-2"></i>Produits</a>
    </div>

    <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
      <h3 class="font-semibold text-slate-800 mb-3">Nouvelle catégorie</h3>
      <form method="post" action="/admin/product-categories" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="md:col-span-2">
          <label class="block text-xs font-medium text-slate-600 mb-1">Libellé <span class="text-red-500">*</span></label>
          <input name="label" required class="border rounded-lg px-3 py-2 w-full text-sm" placeholder="ex. Électricité bâtiment">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Ordre d'affichage</label>
          <input name="sortOrder" type="number" min="0" class="border rounded-lg px-3 py-2 w-full text-sm" placeholder="100">
        </div>
        <div>
          <button type="submit" class="pf-btn pf-btn-primary text-sm py-2 px-4 w-full md:w-auto">Créer</button>
        </div>
      </form>
    </section>

    <section class="bg-white rounded-xl p-4 shadow-sm overflow-auto">
      <table class="w-full text-sm">
        <thead class="bg-slate-100">
        <tr>
          <th class="text-left py-2 px-2">Libellé</th>
          <th class="text-left py-2 px-2">Code</th>
          <th class="text-center py-2 px-2">Ordre</th>
          <th class="text-right py-2 px-2">Produits</th>
          <th class="text-right py-2 px-2">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${categories}" class="border-t border-slate-100">
          <td class="py-2 px-2 font-medium" th:text="${c.label()}"></td>
          <td class="py-2 px-2 font-mono text-xs text-slate-500" th:text="${c.code()}"></td>
          <td class="py-2 px-2 text-center tabular-nums" th:text="${c.sortOrder()}"></td>
          <td class="py-2 px-2 text-right tabular-nums" th:text="${c.productCount()}"></td>
          <td class="py-2 px-2 text-right">
            <div class="flex flex-wrap gap-2 justify-end">
              <button type="button" class="pf-btn pf-btn-primary text-xs py-1 px-3"
                      th:attr="data-id=${c.id()},data-label=${c.label()},data-sort=${c.sortOrder()}"
                      onclick="openEditCategoryModal(this)"><i class="fa-regular fa-pen-to-square"></i> Modifier</button>
              <form th:if="${(adminFullAccess || adminIsGestionnaire) && c.productCount() == 0}" method="post" action="/admin/product-categories/delete" class="inline"
                    th:attr="data-admin-full=${adminFullAccess}"
                    onsubmit="return pfConfirmDeleteWithReason(event, this.dataset.adminFull === 'true' ? 'Supprimer cette catégorie ?' : 'Demander la suppression de cette catégorie ?', this.dataset.adminFull === 'true');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="id" th:value="${c.id()}">
                <button type="submit" class="pf-btn pf-btn-danger text-xs py-1 px-3"><i class="fa-regular fa-trash-can"></i></button>
              </form>
              <span th:if="${c.productCount() > 0}" class="text-xs text-slate-400 self-center" title="Des produits utilisent cette catégorie">—</span>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </section>

<th:block th:replace="~{fragments/admin-chrome :: endMain}"/>

<div id="editCategoryModal" class="hidden fixed inset-0 bg-black/40 items-center justify-center z-50 p-4">
  <div class="bg-white w-full max-w-md rounded-xl p-6 border border-slate-200 shadow-lg">
    <h3 class="font-semibold text-lg text-slate-800 mb-4">Modifier la catégorie</h3>
    <form method="post" action="/admin/product-categories/update" class="space-y-4">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <input type="hidden" id="editCategoryId" name="id">
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Libellé</label>
        <input id="editCategoryLabel" name="label" required class="border rounded-lg px-3 py-2 w-full text-sm">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Ordre d'affichage</label>
        <input id="editCategorySort" name="sortOrder" type="number" min="0" class="border rounded-lg px-3 py-2 w-full text-sm">
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <button type="button" onclick="closeEditCategoryModal()" class="pf-btn pf-btn-secondary py-2 px-4 text-sm">Annuler</button>
        <button type="submit" class="pf-btn pf-btn-primary py-2 px-4 text-sm">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<script th:inline="javascript">
  const p = new URLSearchParams(window.location.search);
  if (p.get('success') === '1') Swal.fire({icon:'success',title:'Catégorie créée',timer:1400,showConfirmButton:false});
  if (p.get('success') === 'updated') Swal.fire({icon:'success',title:'Catégorie mise à jour',timer:1400,showConfirmButton:false});
  if (p.get('success') === 'deleted') Swal.fire({icon:'success',title:'Catégorie supprimée',timer:1400,showConfirmButton:false});
  if (p.get('error')) Swal.fire({icon:'error',title:'Erreur', text: decodeURIComponent(p.get('error').replace(/\+/g,' '))});
  function openEditCategoryModal(btn) {
    document.getElementById('editCategoryId').value = btn.dataset.id || '';
    document.getElementById('editCategoryLabel').value = btn.dataset.label || '';
    document.getElementById('editCategorySort').value = btn.dataset.sort || '100';
    const modal = document.getElementById('editCategoryModal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
  }
  function closeEditCategoryModal() {
    const modal = document.getElementById('editCategoryModal');
    modal.classList.remove('flex');
    modal.classList.add('hidden');
  }
  function confirmDeleteCategory(event) {
    event.preventDefault();
    const form = event.target;
    Swal.fire({icon:'warning',title:'Supprimer cette catégorie ?',showCancelButton:true,confirmButtonText:'Oui',cancelButtonText:'Annuler'})
      .then((r) => { if (r.isConfirmed) form.submit(); });
    return false;
  }
</script>
<script src="/js/admin-wow.js"></script>
</body>
</html>
