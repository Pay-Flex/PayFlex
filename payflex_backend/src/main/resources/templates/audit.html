<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayFlex Admin — Journal d'activité</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="/css/admin-wow.css">
</head>
<body class="pf-admin bg-slate-100 min-h-screen">
<th:block th:replace="~{fragments/admin-chrome :: startMain('space-y-4')}"/>
<th:block th:replace="~{fragments/admin-chrome :: pageHeader(${pageTitle}, ${pageSubtitle})}"/>

    <form method="get" action="/admin/audit" class="bg-white rounded-xl p-4 shadow-sm grid grid-cols-1 md:grid-cols-12 gap-3 items-end border border-slate-200">
      <div class="md:col-span-3">
        <label class="block text-xs font-medium text-slate-600 mb-1">Voir surtout</label>
        <select name="profil" class="border rounded-lg px-3 py-2 w-full text-sm bg-white">
          <option value="tous" th:selected="${profil == null || profil == 'tous'}">Tout le monde</option>
          <option value="gestionnaire" th:selected="${profil == 'gestionnaire'}">Gestionnaires (journal dédié)</option>
          <option value="equipe" th:selected="${profil == 'equipe'}">Équipe PayFlex (admin principal)</option>
          <option value="agent" th:selected="${profil == 'agent'}">Agents terrain</option>
          <option value="client" th:selected="${profil == 'client'}">Clients</option>
          <option value="visiteur" th:selected="${profil == 'visiteur'}">Demandes depuis l'application (sans compte encore)</option>
        </select>
      </div>
      <div class="md:col-span-2">
        <label class="block text-xs font-medium text-slate-600 mb-1">Du</label>
        <input type="date" name="dateFrom" th:value="${dateFrom}" class="border rounded-lg px-3 py-2 w-full text-sm">
      </div>
      <div class="md:col-span-2">
        <label class="block text-xs font-medium text-slate-600 mb-1">Au</label>
        <input type="date" name="dateTo" th:value="${dateTo}" class="border rounded-lg px-3 py-2 w-full text-sm">
      </div>
      <div class="md:col-span-3">
        <label class="block text-xs font-medium text-slate-600 mb-1">Recherche dans les descriptions</label>
        <input name="q" th:value="${q}" placeholder="Mot-clé : nom, téléphone, action…" class="border rounded-lg px-3 py-2 w-full text-sm">
      </div>
      <div class="md:col-span-2">
        <button type="submit" class="pf-btn pf-btn-primary w-full py-2 px-4 text-sm">Filtrer</button>
      </div>
    </form>

    <section class="bg-white rounded-xl p-4 shadow-sm overflow-auto border border-slate-200">
      <div class="flex justify-end gap-2 mb-3">
        <a href="/admin/export/audit.csv" class="pf-btn pf-btn-secondary text-sm">Télécharger le journal (CSV)</a>
        <a href="/admin/export/audit.pdf" class="pf-btn pf-btn-secondary text-sm">Télécharger le journal (PDF)</a>
        <form th:if="${adminFullAccess}" id="pf-audit-reset-form" method="post" action="/admin/audit/reset">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="button" onclick="printThenResetAudit()" class="pf-btn pf-btn-danger text-sm">
            <i class="fa-solid fa-trash-can mr-1"></i>Réinitialiser tout
          </button>
        </form>
      </div>
      <table class="w-full text-sm">
        <thead class="bg-slate-100">
        <tr>
          <th class="text-left py-2 px-2">Date</th>
          <th class="text-left py-2 px-2">Origine</th>
          <th class="text-left py-2 px-2">Qui</th>
          <th class="text-left py-2 px-2">Action</th>
          <th class="text-left py-2 px-2">Motif</th>
          <th class="text-left py-2 px-2">Ce qui s'est passé</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="a : ${auditPage.items()}">
          <td class="py-2 px-2 text-slate-600 whitespace-nowrap align-top" th:text="${a.createdAt()}"></td>
          <td class="py-2 px-2 align-top font-medium text-slate-800" th:text="${a.profileLabel()}"></td>
          <td class="py-2 px-2 align-top" th:text="${a.actorDisplay()}"></td>
          <td class="py-2 px-2 align-top text-xs text-slate-600" th:text="${a.actionKindLabel()}"></td>
          <td class="py-2 px-2 align-top text-xs text-slate-600 max-w-xs" th:text="${a.reason() != null && !a.reason().isEmpty() ? a.reason() : '—'}"></td>
          <td class="py-2 px-2 text-slate-700 align-top max-w-xl leading-snug" th:text="${a.message()}"></td>
        </tr>
        </tbody>
      </table>
      <th:block th:replace="~{fragments/admin-chrome :: pagination(${auditPage}, '/admin/audit', ${filterQuery})}"/>
    </section>

<th:block th:replace="~{fragments/admin-chrome :: endMain}"/>
<script>
  const q = new URLSearchParams(window.location.search);
  if (q.get('success') === 'reset') {
    Swal.fire({ icon: 'success', title: 'Journal réinitialisé', text: 'Le journal a été vidé avec succès.', timer: 2200, showConfirmButton: false });
  }
  function printThenResetAudit() {
    const ok = confirm("Un PDF va s'ouvrir pour impression, puis le journal sera vidé. Continuer ?");
    if (!ok) return;
    window.open('/admin/export/audit-print.pdf', '_blank');
    setTimeout(() => {
      const f = document.getElementById('pf-audit-reset-form');
      if (f) f.submit();
    }, 1200);
  }
</script>
<script src="/js/admin-wow.js"></script>
</body>
</html>
