<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Nouveau gestionnaire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/css/admin-wow.css">
</head>
<body class="pf-admin bg-slate-100 min-h-screen">
<th:block th:replace="~{fragments/admin-chrome :: startMain('space-y-6 max-w-5xl')}"/>
<th:block th:replace="~{fragments/admin-chrome :: pageHeader('Nouveau gestionnaire','Dossier RH et compte de connexion admin')}"/>

<div th:if="${errorMessage}" class="rounded-xl border border-red-200 bg-red-50 text-red-800 px-4 py-3 text-sm" th:text="${errorMessage}"></div>

<form method="post" th:action="@{/admin/gestionnaires/nouveau}" enctype="multipart/form-data" class="space-y-6">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold text-slate-800 border-b pb-2 mb-4"><i class="fa-solid fa-key mr-2 text-blue-700"></i>Compte admin</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="text-xs font-semibold text-slate-600">Identifiant de connexion <span class="text-red-500">*</span></label>
        <input name="username" required pattern="[a-z0-9._-]{3,50}" class="border rounded-lg px-3 py-2 w-full text-sm mt-1" placeholder="ex. amavi.koffi">
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600">Mot de passe de connexion <span class="text-red-500">*</span></label>
        <input name="password" id="gestPassword" type="password" required minlength="8" autocomplete="new-password"
               class="border rounded-lg px-3 py-2 w-full text-sm mt-1" placeholder="Min. 8 caractères">
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600">Confirmer le mot de passe <span class="text-red-500">*</span></label>
        <input name="passwordConfirm" id="gestPasswordConfirm" type="password" required minlength="8" autocomplete="new-password"
               class="border rounded-lg px-3 py-2 w-full text-sm mt-1">
      </div>
    </div>
  </section>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-id-card mr-2 text-blue-700"></i>Identité</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="md:col-span-2"><label class="text-xs font-semibold text-slate-600">Nom complet <span class="text-red-500">*</span></label>
        <input name="fullName" required class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Sexe</label>
        <select name="gender" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"><option value="">—</option><option>Homme</option><option>Femme</option></select></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone</label>
        <input name="phone" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">E-mail</label>
        <input name="email" type="email" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Ville</label>
        <input name="city" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div class="md:col-span-2"><label class="text-xs font-semibold text-slate-600">Adresse</label>
        <textarea name="personalAddress" rows="2" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></textarea></div>
    </div>
  </section>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-briefcase mr-2 text-blue-700"></i>Poste & contrat</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div><label class="text-xs font-semibold text-slate-600">Fonction</label>
        <input name="jobTitle" value="Gestionnaire PayFlex" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Matricule</label>
        <input name="matricule" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Type de contrat</label>
        <select name="contractType" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"><option value="">—</option><option>CDI</option><option>CDD</option><option>Prestataire</option></select></div>
      <div><label class="text-xs font-semibold text-slate-600">Date d’embauche</label>
        <input name="hireDate" type="date" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Date de signature du contrat</label>
        <input name="contractSignedDate" type="date" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
    </div>
  </section>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-phone-volume mr-2 text-amber-600"></i>Urgence & personnes à prévenir</h2>
    <p class="text-xs text-slate-500 mb-3">Contact d’urgence (famille) et personne officielle à prévenir en cas d’absence.</p>
    <div class="grid md:grid-cols-3 gap-4 mb-4">
      <div><label class="text-xs font-semibold text-slate-600">Urgence — nom</label><input name="emergencyContactName" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone</label><input name="emergencyContactPhone" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Lien</label><input name="emergencyContactRelation" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
    </div>
    <div class="grid md:grid-cols-3 gap-4">
      <div><label class="text-xs font-semibold text-slate-600">À prévenir — nom</label><input name="notifyContactName" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone</label><input name="notifyContactPhone" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Lien / rôle</label><input name="notifyContactRelation" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
    </div>
  </section>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-handshake mr-2 text-violet-700"></i>Caution & autres contacts</h2>
    <div class="grid md:grid-cols-3 gap-4 mb-4">
      <div><label class="text-xs font-semibold text-slate-600">Cautionnaire — nom</label><input name="guarantorName" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone</label><input name="guarantorPhone" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Lien</label><input name="guarantorRelation" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
    </div>
    <div class="grid md:grid-cols-2 gap-4">
      <div><label class="text-xs font-semibold text-slate-600">Autre contact — nom</label><input name="secondaryContactName" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone</label><input name="secondaryContactPhone" class="border rounded-lg px-3 py-2 w-full text-sm mt-1"></div>
      <div class="md:col-span-2"><th:block th:replace="~{fragments/admin-chrome :: hrReferentHelp}"/></div>
      <div><label class="text-xs font-semibold text-slate-600">Nom du référent interne (optionnel)</label><input name="supervisorName" class="border rounded-lg px-3 py-2 w-full text-sm mt-1" placeholder="Ex. responsable RH"></div>
      <div><label class="text-xs font-semibold text-slate-600">Téléphone du référent</label><input name="supervisorPhone" type="tel" class="border rounded-lg px-3 py-2 w-full text-sm mt-1" placeholder="Optionnel"></div>
    </div>
  </section>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-clipboard-check mr-2"></i>Références & notes</h2>
    <textarea name="referencesNotes" rows="2" class="border rounded-lg px-3 py-2 w-full text-sm mb-3" placeholder="Références vérifiées…"></textarea>
    <textarea name="internalNotes" rows="2" class="border rounded-lg px-3 py-2 w-full text-sm" placeholder="Notes RH internes (admin uniquement)…"></textarea>
  </section>

  <section class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
    <h2 class="text-lg font-bold border-b pb-2 mb-4"><i class="fa-solid fa-paperclip mr-2"></i>Pièces</h2>
    <div class="grid md:grid-cols-3 gap-4">
      <div><label class="text-xs font-semibold text-slate-600">Photo profil</label><input name="photo" type="file" accept="image/*,.pdf" class="text-xs mt-1 w-full"></div>
      <div><label class="text-xs font-semibold text-slate-600">Pièce d’identité</label><input name="idDocument" type="file" accept="image/*,.pdf" class="text-xs mt-1 w-full"></div>
      <div><label class="text-xs font-semibold text-slate-600">Contrat signé</label><input name="contractDocument" type="file" accept=".pdf,image/*" class="text-xs mt-1 w-full"></div>
    </div>
  </section>

  <div class="flex gap-3">
    <button type="submit" class="pf-btn pf-btn-primary"><i class="fa-solid fa-save mr-2"></i>Créer le gestionnaire</button>
    <a href="/admin/gestionnaires" class="pf-btn pf-btn-secondary">Annuler</a>
  </div>
</form>

<th:block th:replace="~{fragments/admin-chrome :: endMain}"/>
<script>
  (function () {
    const form = document.querySelector('form[action="/admin/gestionnaires/nouveau"]');
    if (!form) return;
    form.addEventListener('submit', (e) => {
      const a = document.getElementById('gestPassword');
      const b = document.getElementById('gestPasswordConfirm');
      if (a && b && a.value !== b.value) {
        e.preventDefault();
        alert('Les mots de passe ne correspondent pas.');
      }
    });
  })();
</script>
<script src="/js/admin-wow.js"></script>
</body>
</html>
