# Port déjà utilisé (Windows) : netstat -ano | findstr :8088   puis   taskkill /PID <pid> /F
# Ou changer temporairement server.port (ex. 8089).
server:
  port: 8088
  # Obligatoire derrière Cloudflare Tunnel, nginx, etc. : évite les redirections HTTP
  # alors que le client est en HTTPS → ERR_TOO_MANY_REDIRECTS dans le navigateur.
  forward-headers-strategy: framework

# Fichiers de log (racine du processus, ex. payflex_backend/) — voir logback-spring.xml
payflex:
  logging:
    error-log-file: erreur.log
    diagnostic-log-file: diagnostic.log
    mobile-api-log-file: mobile-api.log
  contributions:
    # Validation auto mobile money si l'agent n'a pas réagi (0 = désactivé)
    auto-validate-mobile-money-hours: ${PAYFLEX_AUTO_VALIDATE_HOURS:24}
    # Collecte espèces saisie par l'agent → validée immédiatement
    agent-cash-auto-validate: true
  fedapay:
    enabled: ${FEDAPAY_ENABLED:true}
    sandbox: ${FEDAPAY_SANDBOX:true}
    # Clé secrète (sk_…) : uniquement via variable d'environnement ou fichier .env local — jamais dans Git
    api-key: ${FEDAPAY_API_KEY:}
    public-key: ${FEDAPAY_PUBLIC_KEY:}
    webhook-secret: ${FEDAPAY_WEBHOOK_SECRET:}
    public-base-url: ${PAYFLEX_PUBLIC_URL:http://localhost:8088}

spring:
  application:
    name: payflex-backend
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB
  thymeleaf:
    cache: false
  datasource:
    url: ${PAYFLEX_DB_URL:jdbc:mysql://localhost:3306/payflexdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${PAYFLEX_DB_USER:root}
    password: ${PAYFLEX_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
